# cargo-deny configuration — validates licenses, bans, advisories, sources.
# Rewritten 2026-07-19 for the pinned cargo-deny 0.20.2 schema (see .github/workflows/ci.yml,
# which installs exactly `cargo-deny 0.20.2 --locked`). Previous file failed to parse
# (duplicate `[licenses]` table) and carried keys removed by cargo-deny PR #611
# (`copyleft`, `unlicensed`, `allow-osi-fsf-free`, `default`) — see docs/dependencies.md.
#
# Core crates remain zero-dep; the audit applies to the sandbox dependency tree
# (eframe/egui/winit/glow) and all transitive deps, over ALL features (`all-features`)
# so the `interactive` feature graph (wayland/x11/quick-xml) is covered. This replaces
# the former invalid `cargo deny check --all-features` CLI usage.

[graph]
all-features = true
targets = []

[advisories]
# v2 advisory db format is the default in 0.20.x; `version` key intentionally omitted.
# unmaintained/unsound take *scope* values in the pinned schema: workspace|transitive|all|none.
yanked = "deny"
unmaintained = "workspace"
unsound = "workspace"
# Dispositioned 2026-07-19 (review-by 2027-01-19 or on eframe/winit upgrade, whichever is
# first) — full writeup in docs/dependencies.md and docs/adr/17-decision.md:
# quick-xml 0.39.4 cannot be upgraded alone: wayland-scanner 0.31.10 (latest published)
# pins quick-xml = "0.39"; a fix requires an eframe/winit major upgrade. The ONLY consumer
# of quick-xml in the graph is wayland-scanner, a build-time proc-macro that parses the
# wayland protocol XML shipped inside the pinned, checksummed crates.io registry packages
# (wayland-protocols). No runtime XML parsing exists; no untrusted input can reach the
# quadratic duplicate-attribute scan (0194) or the unbounded namespace allocation (0195).
ignore = [
    { id = "RUSTSEC-2026-0194", reason = "build-time-only wayland-scanner parses trusted registry-shipped protocol XML; no untrusted input path. Pinned by winit 0.30 stack; fix tracked with eframe upgrade. review-by 2027-01-19" },
    { id = "RUSTSEC-2026-0195", reason = "build-time-only wayland-scanner parses trusted registry-shipped protocol XML; no untrusted input path. Pinned by winit 0.30 stack; fix tracked with eframe upgrade. review-by 2027-01-19" },
]

[bans]
multiple-versions = "warn"
wildcards = "allow"
highlight = "all"
# Deny copyleft that conflicts with Apache-2.0, but allow typical permissive
deny = [
    { name = "openssl", reason = "GPL/LGPL via openssl crate — avoid" },
]

[licenses]
version = 2
confidence-threshold = 0.8
# Explicit allow list — Apache-2.0 and MIT are primary, plus permissive BSD/ISC/etc.
# Every entry is encountered in the current lockfile; each addition carries a written
# justification in docs/dependencies.md (BSL-1.0, OFL-1.1, Ubuntu-font-1.0 added 2026-07-19).
# Only licenses actually encountered in the full all-target/all-feature graph are listed
# (validated by `cargo deny check licenses` 2026-07-19). Removed as not-encountered:
# MPL-2.0 (pre-existing), CC0-1.0, Unicode-DFS-2016, CDLA-Permissive-2.0.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Zlib",
    "Unicode-3.0",
    "BSL-1.0",
    "OFL-1.1",
    "Ubuntu-font-1.0",
]
# Some crates dual-licensed MIT/Apache-2.0 — allow both
exceptions = []

# Private crates are our own
[licenses.private]
ignore = true

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
