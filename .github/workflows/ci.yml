name: CI & Quality Gates

on: [push, pull_request]

jobs:
  verify:
    name: Verify (${{ matrix.os }})
    strategy:
      # fail-fast disabled intentionally (decision kept after 2026-07-19 repair): every
      # platform result must remain observable even if a sibling job fails — the red run
      # 29583407674 cancelled windows/macos, hiding platform evidence. No hidden failures.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust Stable Toolchain (1.97.1)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          components: rustfmt, clippy

      - name: Verify Code Formatting
        run: cargo fmt --all --check

      - name: Verify Strict Clippy Lints (All Targets & Features)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings

      - name: Execute Full Workspace Test Suite (All Features)
        run: cargo test --workspace --all-features

      - name: Execute Workspace Doctests
        run: cargo test --doc --workspace

      - name: Verify Double-Precision (f64) Math Configuration
        run: cargo test -p auralite-math --no-default-features --features f64

      - name: Verify Single-Thread Dynamics Configuration
        run: cargo build -p auralite-dynamics --no-default-features --features single-thread

      - name: Build Release Artifacts
        run: cargo build --workspace --release

      - name: Run Automated Sandbox Scene Verifications (Headless)
        run: cargo run -p auralite-sandbox --release

      - name: Run Fuzz Smoke (Stable Harness, H8)
        run: cargo run -p auralite-fuzz --release

      - name: Verify Benchmark Compilation (Smoke Check)
        run: cargo bench --workspace --no-run

      - name: Verify C FFI Compilation and Header Drift (Linux/macOS)
        if: runner.os != 'Windows'
        run: |
          gcc crates/auralite-ffi/c_example/main.c target/release/libauralite_ffi.a -lpthread -ldl -lm -o c_verify
          ./c_verify

      - name: Build Interactive Sandbox (Feature Gated, No Run)
        if: runner.os == 'Linux'
        run: cargo build -p auralite-sandbox --features interactive

  cross_check:
    name: Cross-Target Parity Check (aarch64)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Stable Toolchain & aarch64 Target
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
          targets: aarch64-unknown-linux-gnu
      - name: Check ARM64 SIMD (NEON) Parity
        run: cargo check --workspace --target aarch64-unknown-linux-gnu --all-features

  audit:
    name: Dependency Audit (cargo-deny)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust Stable Toolchain (1.97.1)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.97.1
      # Pinned: 0.20.2 --locked. An unpinned install pulled a schema-drifting cargo-deny
      # that rejected deny.toml on 2026-07-17 (run 29583407674). deny.toml is written and
      # validated against exactly this version.
      - name: Install cargo-deny (pinned)
        run: cargo install cargo-deny --version 0.20.2 --locked
      # Single root-level canonical invocation. `[graph] all-features = true` in deny.toml
      # covers the whole workspace feature graph incl. the sandbox `interactive` feature
      # (eframe/winit/wayland/quick-xml tree); `--all-features` / `--manifest-path` CLI
      # flags were invalid on pinned check and duplicated this coverage.
      - name: Check Licenses, Bans, Advisories, Sources
        run: cargo deny check
